# agent-loop default safety configuration.
# Override per-repo by creating `<target_repo>/.agent-loop/config.toml`
# with the same shape.

[artifacts]
# compact keeps durable artifacts and removes transient diff/progress files
# after successful review.
# debug preserves transient stats/diff/progress files per round.
mode = "compact"

[worker_models]
allowed = ["haiku", "sonnet", "opus"]
default = "sonnet"

[worker_reasoning]
# Reasoning effort the worker subagent should apply. Independent of
# worker_models: a `broad` scope can still pick `low` effort if the task is
# mostly mechanical, and a `narrow` scope can pick `high` if the few changes
# touch deep architecture.
allowed = ["low", "medium", "high"]
default = "medium"

[safety.bash_block]
patterns = [
  "^\\s*git\\s+(commit|push|merge|rebase|reset\\s+--hard|clean\\s+-f)",
  "^\\s*rm\\s+-rf",
  "^\\s*sudo\\b",
  "alembic\\s+upgrade",
  "prisma\\s+migrate\\s+(deploy|reset)",
  "psql.*-c\\s+['\"]?(DROP|TRUNCATE|DELETE)",
  "^\\s*curl.*\\|\\s*(sh|bash)",
  "^\\s*npm\\s+publish",
  "^\\s*docker\\s+(push|rmi)",
]

[safety.sensitive_paths]
patterns = [
  "\\.env(\\..+)?$",
  "secrets/",
  "credentials\\.",
  "/migrations/",
  "/alembic/versions/",
  "ci/",
  ".github/workflows/",
  "Dockerfile",
  "docker-compose\\.",
  "package-lock\\.json$",
  "poetry\\.lock$",
  "uv\\.lock$",
]
